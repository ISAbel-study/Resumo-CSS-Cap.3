<!DOCTYPE html>
<html>
<head>
	<title>Login</title> 
	<link href="index.css" type="text/css" rel="stylesheet" />
</head> 		<!------ esse link vai ligar o index.html ao index.css ----->

<body>
	<form action = "resumo-css.html" method="GET">
	<div class="form-row"> 
		<legend><h2><b>Login</b></h2></legend>
		<label for="priName">Nome Completo:</label>
		<input id="priName" type="text">
	</div>
	<div class="form-row">
		<label for="email">Email:</label>
		<input id="email" type="email">
	</div>
	 <div class="form-row">
		<legend><b><h3>Feedback rápido</h3></b></legend>
			<label for="experiencia">
				Qual a sua expectativa para com esse resumo?
			<select id="experiencia">
				<option value="excelente">Excelente</option>
			  	<option value="boa">Boa</option>
				 <option value="mediana">Mediana</option>
				 <option value="ruim">Ruim</option>
				<option value="pessima">Péssima</option>
			</select>
			</label>
	</div>
	<div class="form-row">
		<button type="submit">Entrar</button>
	</div>
	</form>
</body>
</html>
